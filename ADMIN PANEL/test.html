<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Firebase Diagnostic</title>
<style>
body{font-family:system-ui;background:#1C1C1E;color:white;padding:20px;max-width:760px;margin:0 auto;}
h1{font-size:20px;margin:0 0 8px;}
.box{background:#2C2C2E;border-radius:12px;padding:16px;margin:12px 0;font-size:14px;line-height:1.6;}
.ok{color:#34C759;}.err{color:#FF3B30;}.warn{color:#FF9500;}
button{padding:10px 16px;border-radius:8px;border:none;background:#007AFF;color:white;font-weight:600;cursor:pointer;font-size:14px;margin:4px;}
button:disabled{opacity:0.4;}
pre{background:#000;padding:10px;border-radius:6px;overflow-x:auto;font-size:12px;white-space:pre-wrap;word-break:break-all;}
</style></head><body>
<h1>🔥 Firebase Diagnostic Tool</h1>
<p style="color:#8E8E93;font-size:13px;">Tests if your Firebase project is set up correctly.</p>
<div class="box" id="status">⏳ Loading…</div>
<div class="box">
  <button id="testWrite">✍ Test Write</button>
  <button id="testRead">📖 Test Read</button>
  <button id="testRules">🔐 Test Rules</button>
</div>
<div class="box"><strong>Console:</strong><pre id="log"></pre></div>
<script>
const CFG={apiKey:"AIzaSyCiqaLzh7PoVC5l03sJFdtK548Wulufn94",authDomain:"alll-projects-admin-pennal.firebaseapp.com",projectId:"alll-projects-admin-pennal",storageBucket:"alll-projects-admin-pennal.firebasestorage.app",messagingSenderId:"689297868215",appId:"1:689297868215:web:2747b19c2da47a31f49432"};
function log(m,c){const el=document.getElementById('log');el.innerHTML+=(c?'<span class="'+c+'">':'')+m+(c?'</span>':'')+'\n';el.scrollTop=el.scrollHeight;}
function setStatus(m,c){document.getElementById('status').innerHTML='<span class="'+(c||'')+'">'+m+'</span>';}
async function load(){
  try{
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    if(!firebase.apps.length)firebase.initializeApp(CFG);
    const db=firebase.firestore();
    window._db=db;
    setStatus('✅ Firebase loaded. Project: <code>'+CFG.projectId+'</code>','ok');
    log('Firebase initialized','ok');
  }catch(e){setStatus('❌ Firebase load failed: '+e.message,'err');log('Error: '+e.message,'err');}
}
document.getElementById('testWrite').onclick=async()=>{
  try{
    log('Writing test document…');
    const ref=await _db.collection('submissions').add({test:true,site_id:'diagnostic',created_at:firebase.firestore.FieldValue.serverTimestamp()});
    log('✅ Write OK. Doc ID: '+ref.id,'ok');
  }catch(e){log('❌ Write FAILED: '+e.message,'err');}
};
document.getElementById('testRead').onclick=async()=>{
  try{
    log('Reading submissions…');
    const snap=await _db.collection('submissions').orderBy('created_at','desc').limit(5).get();
    log('✅ Read OK. Found '+snap.size+' docs','ok');
    snap.forEach(d=>{const x=d.data();log('  • '+d.id+' | site: '+x.site_id+' | email: '+(x.email||'-'));});
  }catch(e){log('❌ Read FAILED: '+e.message,'err');}
};
document.getElementById('testRules').onclick=async()=>{
  try{
    log('Testing rules (try unauth read)…');
    await _db.collection('submissions').limit(1).get();
    log('✅ Read allowed by rules','ok');
  }catch(e){
    if(e.code==='permission-denied'){log('❌ Rules BLOCKED read/write. You need to set Firestore rules to: allow read, write, delete: if true;','err');}
    else log('⚠️ '+e.message,'warn');
  }
};
load();
</script></body></html>
